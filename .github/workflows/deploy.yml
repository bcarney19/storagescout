name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STORAGESCOUT_HOST }}
          username: ${{ secrets.STORAGESCOUT_USER }}
          key: ${{ secrets.STORAGESCOUT_SSH_KEY }}
          script_stop: true
          script: |
            cd /var/www/storagescout
            sudo bash deploy/update.sh
